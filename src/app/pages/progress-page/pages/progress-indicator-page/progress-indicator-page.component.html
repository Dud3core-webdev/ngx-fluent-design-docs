<h2 class="page-title">Progress Indicator</h2>
<version-support-table [supportsV11]="true" [supportsV12]="true" [supportsV13]="true"></version-support-table>
<component-api-table [data]="apiData"></component-api-table>

<ngx-fluent-design-card>
    <div class="d-flex justify-content-between align-items-center">
        <h3>Example</h3>
        <ngx-fluent-design-button (clicked)="resetProgress()" [disabled]="progressIndicatorCurrentValue() < 100">Reset
            progress</ngx-fluent-design-button>
    </div>
    <div class="d-flex align-items-center pb-3">
        <ngx-fluent-design-progress-indicator [label]="'Label'" [description]="'Description'"
            [currentValue]="progressIndicatorCurrentValue()" class="w-100"></ngx-fluent-design-progress-indicator>
    </div>

    <h4 class='mb-4'>Usage</h4>
    <markdown [src]="'./assets/docs/code-examples/progress/progress-indicator-usage.example.ts'"></markdown>
</ngx-fluent-design-card>
